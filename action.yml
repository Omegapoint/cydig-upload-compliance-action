name: 'cydig/uploadcompliancestateaction@v1'
description: 'Cydig upload action'
author: 'Omgeapoint'

inputs:
  cydigConfigPath:
    description: 'The path to the json-file containing configuration for CyDig'
    required: true
    default: 'Not working'

  subscriptionId:
    description: 'SubscriptionId to use for the connections in the custom task.'
    required: true
    default: 'Not working'

#outputs:
#  readme-badges:
#   description: 'README badges text file'

#runs:
  #using: node16
  #main: dist/index.js
runs:
  using: "composite"
  steps:
    - name: "Run script"
      run: node ${{ github.action_path }}/dist/index.js
      shell: bash
      env:
        urlUpdate: ${{ vars.URLUPDATECOMPLIANCESTATE }}
        urlRead: ${{ vars.URLREADTOREADME }}
        urlDashboard: ${{ vars.URLDASHBOARD }}
        readToReadMeKeyAcessKey: ${{ secrets.READTOREADMEACCESSKEY }}
  
